slam_toolbox:
  ros__parameters:
    use_sim_time: true
    mode: mapping
    map_frame: map
    odom_frame: odom
    base_frame: base_link
    scan_topic: /apex/sim/scan

    # The EKF path adds some TF delay versus ideal odom, so the async mapper
    # keeps a modest scan queue instead of the single-message ideal setting.
    scan_queue_size: 20
    throttle_scans: 1
    transform_publish_period: 0.05
    map_update_interval: 0.5
    resolution: 0.05
    max_laser_range: 12.0
    minimum_time_interval: 0.1
    minimum_travel_distance: 0.08
    minimum_travel_heading: 0.04
    transform_timeout: 0.5
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000
    enable_interactive_mode: true

    use_scan_matching: true
    use_scan_barycenter: true
    scan_buffer_size: 20
    scan_buffer_maximum_scan_distance: 15.0
    link_match_minimum_response_fine: 0.12
    link_scan_maximum_distance: 1.5
    loop_search_maximum_distance: 3.0
    # Medium-distortion runs prioritize stable online mapping over aggressive
    # graph correction during the first integration pass.
    do_loop_closing: false
