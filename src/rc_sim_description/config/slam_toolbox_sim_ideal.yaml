slam_toolbox:
  ros__parameters:
    use_sim_time: true
    mode: mapping
    map_frame: map
    odom_frame: odom
    # The ideal mode keeps base_link as the robot frame and relies on the
    # URDF-published base_link -> laser TF for the scan geometry.
    base_frame: base_link
    # The ideal stage bypasses the degraded LiDAR pipeline and maps directly
    # from Gazebo's perfect LaserScan topic.
    scan_topic: /apex/sim/scan_ideal

    # Keep the async mapper queue short while validating the ideal geometry.
    scan_queue_size: 1
    throttle_scans: 1
    transform_publish_period: 0.05
    map_update_interval: 0.5
    resolution: 0.05
    max_laser_range: 12.0
    minimum_time_interval: 0.08
    transform_timeout: 0.2
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000
    enable_interactive_mode: true

    use_scan_matching: true
    use_scan_barycenter: true
    minimum_travel_distance: 0.03
    minimum_travel_heading: 0.03
    scan_buffer_size: 20
    scan_buffer_maximum_scan_distance: 15.0
    link_match_minimum_response_fine: 0.12
    link_scan_maximum_distance: 1.5
    loop_search_maximum_distance: 3.0
    # Disable loop closure temporarily while diagnosing the ideal scan / TF
    # geometry so curve distortion comes only from the live odom + scan chain.
    do_loop_closing: false
