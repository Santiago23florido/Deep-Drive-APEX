apex_sim_ekf_filter_node:
  ros__parameters:
    use_sim_time: true
    frequency: 30.0
    sensor_timeout: 0.15
    two_d_mode: true
    publish_tf: true
    publish_acceleration: false
    print_diagnostics: true
    transform_timeout: 0.05

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    odom0: /apex/sim/rf2o_odom
    imu0: /apex/sim/imu

    # RF2O is the primary planar-motion source: x, y, and forward velocity.
    odom0_config: [true, true, false,
                   false, false, false,
                   true, false, false,
                   false, false, false,
                   false, false, false]
    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 4
    odom0_pose_rejection_threshold: 5.0
    odom0_twist_rejection_threshold: 2.0

    # The IMU stabilizes heading only: yaw plus yaw rate. Linear acceleration
    # stays out because medium-noise integration hurts 2D robustness.
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  false, false, false]
    imu0_differential: false
    imu0_relative: false
    imu0_queue_size: 10
    imu0_pose_rejection_threshold: 0.8
    imu0_twist_rejection_threshold: 0.8
    imu0_remove_gravitational_acceleration: true
