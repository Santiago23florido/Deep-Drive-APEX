services:
  apex_pipeline:
    container_name: apex_pipeline
    build:
      context: ..
      dockerfile: docker/Dockerfile
      network: host
    restart: "no"
    privileged: true
    network_mode: host
    devices:
      - "${APEX_SERIAL_PORT:-/dev/ttyACM0}:${APEX_SERIAL_PORT:-/dev/ttyACM0}"
      - "${APEX_LIDAR_PORT:-/dev/ttyUSB0}:${APEX_LIDAR_PORT:-/dev/ttyUSB0}"
    environment:
      ROS_DOMAIN_ID: "${ROS_DOMAIN_ID:-30}"
      ROS_AUTOMATIC_DISCOVERY_RANGE: "${ROS_AUTOMATIC_DISCOVERY_RANGE:-SUBNET}"
      RMW_IMPLEMENTATION: "${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}"
      APEX_GIT_COMMIT: "${APEX_GIT_COMMIT:-unknown}"
      APEX_GIT_DIRTY: "${APEX_GIT_DIRTY:-0}"
      APEX_SERIAL_PORT: "${APEX_SERIAL_PORT:-/dev/ttyACM0}"
      APEX_BAUDRATE: "${APEX_BAUDRATE:-115200}"
      APEX_LIDAR_PORT: "${APEX_LIDAR_PORT:-/dev/ttyUSB0}"
      APEX_LIDAR_BAUDRATE: "${APEX_LIDAR_BAUDRATE:-115200}"
      APEX_LIDAR_HEADING_OFFSET_DEG: "${APEX_LIDAR_HEADING_OFFSET_DEG:-}"
      APEX_LIDAR_X_M: "${APEX_LIDAR_X_M:-}"
      APEX_LIDAR_Y_M: "${APEX_LIDAR_Y_M:-}"
      APEX_LIDAR_Z_M: "${APEX_LIDAR_Z_M:-}"
      APEX_LIDAR_ROLL_RAD: "${APEX_LIDAR_ROLL_RAD:-}"
      APEX_LIDAR_PITCH_RAD: "${APEX_LIDAR_PITCH_RAD:-}"
      APEX_LIDAR_YAW_RAD: "${APEX_LIDAR_YAW_RAD:-}"
      APEX_BASE_FRAME: "${APEX_BASE_FRAME:-}"
      APEX_LIDAR_FRAME: "${APEX_LIDAR_FRAME:-}"
      APEX_ENABLE_RECON_MAPPING: "${APEX_ENABLE_RECON_MAPPING:-0}"
      APEX_ENABLE_KINEMATICS: "${APEX_ENABLE_KINEMATICS:-1}"
      APEX_ENABLE_IMU_LIDAR_FUSION: "${APEX_ENABLE_IMU_LIDAR_FUSION:-0}"
      APEX_ENABLE_CURVE_ENTRY_PLANNER: "${APEX_ENABLE_CURVE_ENTRY_PLANNER:-0}"
      APEX_ENABLE_PATH_TRACKER: "${APEX_ENABLE_PATH_TRACKER:-0}"
      APEX_ENABLE_CMDVEL_ACTUATION_BRIDGE: "${APEX_ENABLE_CMDVEL_ACTUATION_BRIDGE:-0}"
      APEX_ENABLE_LOCAL_ODOM_FUSION: "${APEX_ENABLE_LOCAL_ODOM_FUSION:-1}"
      APEX_ENABLE_SLAM_TOOLBOX: "${APEX_ENABLE_SLAM_TOOLBOX:-}"
      APEX_RECON_DIAGNOSTIC_MODE: "${APEX_RECON_DIAGNOSTIC_MODE:-}"
      APEX_RECON_FIXED_SPEED_PCT: "${APEX_RECON_FIXED_SPEED_PCT:-}"
      APEX_RECON_STEP_DURATION_S: "${APEX_RECON_STEP_DURATION_S:-}"
      APEX_RECON_LOG_PATH: "${APEX_RECON_LOG_PATH:-}"
      APEX_RECON_LOG_FLUSH_EVERY: "${APEX_RECON_LOG_FLUSH_EVERY:-}"
      APEX_RECON_LOG_OVERWRITE: "${APEX_RECON_LOG_OVERWRITE:-}"
      APEX_RECON_TIMEOUT_S: "${APEX_RECON_TIMEOUT_S:-}"
      APEX_RECON_MAX_RECOVERIES: "${APEX_RECON_MAX_RECOVERIES:-}"
      APEX_RECON_MIN_PROGRESS_M: "${APEX_RECON_MIN_PROGRESS_M:-}"
      APEX_RECON_LOG_LEVEL: "${APEX_RECON_LOG_LEVEL:-}"
      APEX_RESET_MAP_ON_START: "${APEX_RESET_MAP_ON_START:-}"
      APEX_SAVE_MAP_ON_COMPLETION: "${APEX_SAVE_MAP_ON_COMPLETION:-}"
      APEX_STEERING_CENTER_TRIM_DC: "${APEX_STEERING_CENTER_TRIM_DC:-}"
      APEX_STEERING_DIRECTION_SIGN: "${APEX_STEERING_DIRECTION_SIGN:-}"
      APEX_EXPLORE_MIN_SPEED_PCT: "${APEX_EXPLORE_MIN_SPEED_PCT:-}"
      APEX_EXPLORE_MAX_SPEED_PCT: "${APEX_EXPLORE_MAX_SPEED_PCT:-}"
      APEX_STEERING_GAIN: "${APEX_STEERING_GAIN:-}"
      APEX_FRONT_WINDOW_DEG: "${APEX_FRONT_WINDOW_DEG:-}"
      APEX_SIDE_WINDOW_DEG: "${APEX_SIDE_WINDOW_DEG:-}"
      APEX_FOV_HALF_ANGLE_DEG: "${APEX_FOV_HALF_ANGLE_DEG:-}"
      APEX_CENTER_ANGLE_PENALTY_PER_DEG: "${APEX_CENTER_ANGLE_PENALTY_PER_DEG:-}"
      APEX_WALL_AVOID_DISTANCE_M: "${APEX_WALL_AVOID_DISTANCE_M:-}"
      APEX_WALL_AVOID_GAIN_DEG_PER_M: "${APEX_WALL_AVOID_GAIN_DEG_PER_M:-}"
      APEX_GAP_ESCAPE_HEADING_THRESHOLD_DEG: "${APEX_GAP_ESCAPE_HEADING_THRESHOLD_DEG:-}"
      APEX_GAP_ESCAPE_RELEASE_DISTANCE_M: "${APEX_GAP_ESCAPE_RELEASE_DISTANCE_M:-}"
      APEX_GAP_ESCAPE_WEIGHT: "${APEX_GAP_ESCAPE_WEIGHT:-}"
      APEX_CORRIDOR_BALANCE_RATIO_THRESHOLD: "${APEX_CORRIDOR_BALANCE_RATIO_THRESHOLD:-}"
      APEX_CORRIDOR_FRONT_MIN_CLEARANCE_M: "${APEX_CORRIDOR_FRONT_MIN_CLEARANCE_M:-}"
      APEX_CORRIDOR_SIDE_MIN_CLEARANCE_M: "${APEX_CORRIDOR_SIDE_MIN_CLEARANCE_M:-}"
      APEX_CORRIDOR_FRONT_TURN_WEIGHT: "${APEX_CORRIDOR_FRONT_TURN_WEIGHT:-}"
      APEX_CORRIDOR_OVERRIDE_MARGIN_DEG: "${APEX_CORRIDOR_OVERRIDE_MARGIN_DEG:-}"
      APEX_CORRIDOR_MIN_HEADING_DEG: "${APEX_CORRIDOR_MIN_HEADING_DEG:-}"
      APEX_CORRIDOR_WALL_START_DEG: "${APEX_CORRIDOR_WALL_START_DEG:-}"
      APEX_CORRIDOR_WALL_END_DEG: "${APEX_CORRIDOR_WALL_END_DEG:-}"
      APEX_CORRIDOR_WALL_MIN_POINTS: "${APEX_CORRIDOR_WALL_MIN_POINTS:-}"
      APEX_WALL_FOLLOW_TARGET_DISTANCE_M: "${APEX_WALL_FOLLOW_TARGET_DISTANCE_M:-}"
      APEX_WALL_FOLLOW_GAIN_DEG_PER_M: "${APEX_WALL_FOLLOW_GAIN_DEG_PER_M:-}"
      APEX_WALL_FOLLOW_LIMIT_DEG: "${APEX_WALL_FOLLOW_LIMIT_DEG:-}"
      APEX_WALL_FOLLOW_ACTIVATION_HEADING_DEG: "${APEX_WALL_FOLLOW_ACTIVATION_HEADING_DEG:-}"
      APEX_WALL_FOLLOW_RELEASE_BALANCE_RATIO: "${APEX_WALL_FOLLOW_RELEASE_BALANCE_RATIO:-}"
      APEX_WALL_FOLLOW_MIN_CYCLES: "${APEX_WALL_FOLLOW_MIN_CYCLES:-}"
      APEX_WALL_FOLLOW_MAX_CLEARANCE_M: "${APEX_WALL_FOLLOW_MAX_CLEARANCE_M:-}"
      APEX_WALL_FOLLOW_FRONT_TURN_WEIGHT: "${APEX_WALL_FOLLOW_FRONT_TURN_WEIGHT:-}"
      APEX_STARTUP_CONSENSUS_MIN_HEADING_DEG: "${APEX_STARTUP_CONSENSUS_MIN_HEADING_DEG:-}"
      APEX_STARTUP_VALID_CYCLES_REQUIRED: "${APEX_STARTUP_VALID_CYCLES_REQUIRED:-}"
      APEX_STARTUP_GAP_LOCKOUT_CYCLES: "${APEX_STARTUP_GAP_LOCKOUT_CYCLES:-}"
      APEX_STARTUP_LATCH_CYCLES: "${APEX_STARTUP_LATCH_CYCLES:-}"
      APEX_AMBIGUITY_PROBE_SPEED_PCT: "${APEX_AMBIGUITY_PROBE_SPEED_PCT:-}"
      APEX_TURN_SPEED_REDUCTION: "${APEX_TURN_SPEED_REDUCTION:-}"
      APEX_MIN_TURN_SPEED_FACTOR: "${APEX_MIN_TURN_SPEED_FACTOR:-}"
      APEX_RECORD_DEBUG: "${APEX_RECORD_DEBUG:-0}"
      APEX_DEBUG_RUN_ID: "${APEX_DEBUG_RUN_ID:-}"
      APEX_DEBUG_OUTPUT_DIR: "${APEX_DEBUG_OUTPUT_DIR:-/work/ros2_ws/debug_runs}"
    volumes:
      - ../ros2_ws:/work/ros2_ws
      - /sys/class/pwm:/sys/class/pwm
    working_dir: /work/ros2_ws
    command: ["/bin/bash", "/work/ros2_ws/scripts/start_apex_pipeline.sh"]
