services:
  apex_pipeline:
    container_name: apex_pipeline
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    privileged: true
    network_mode: host
    devices:
      - "${APEX_SERIAL_PORT:-/dev/ttyACM0}:${APEX_SERIAL_PORT:-/dev/ttyACM0}"
      - "${APEX_LIDAR_PORT:-/dev/ttyUSB0}:${APEX_LIDAR_PORT:-/dev/ttyUSB0}"
    environment:
      ROS_DOMAIN_ID: "${ROS_DOMAIN_ID:-30}"
      ROS_AUTOMATIC_DISCOVERY_RANGE: "${ROS_AUTOMATIC_DISCOVERY_RANGE:-SUBNET}"
      RMW_IMPLEMENTATION: "${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}"
      APEX_GIT_COMMIT: "${APEX_GIT_COMMIT:-unknown}"
      APEX_GIT_DIRTY: "${APEX_GIT_DIRTY:-0}"
      APEX_SERIAL_PORT: "${APEX_SERIAL_PORT:-/dev/ttyACM0}"
      APEX_BAUDRATE: "${APEX_BAUDRATE:-115200}"
      APEX_LIDAR_PORT: "${APEX_LIDAR_PORT:-/dev/ttyUSB0}"
      APEX_LIDAR_BAUDRATE: "${APEX_LIDAR_BAUDRATE:-115200}"
      APEX_LIDAR_HEADING_OFFSET_DEG: "${APEX_LIDAR_HEADING_OFFSET_DEG:-}"
      APEX_LIDAR_X_M: "${APEX_LIDAR_X_M:-}"
      APEX_LIDAR_Y_M: "${APEX_LIDAR_Y_M:-}"
      APEX_LIDAR_Z_M: "${APEX_LIDAR_Z_M:-}"
      APEX_LIDAR_ROLL_RAD: "${APEX_LIDAR_ROLL_RAD:-}"
      APEX_LIDAR_PITCH_RAD: "${APEX_LIDAR_PITCH_RAD:-}"
      APEX_LIDAR_YAW_RAD: "${APEX_LIDAR_YAW_RAD:-}"
      APEX_BASE_FRAME: "${APEX_BASE_FRAME:-}"
      APEX_LIDAR_FRAME: "${APEX_LIDAR_FRAME:-}"
      APEX_LAUNCH_FILE: "${APEX_LAUNCH_FILE:-apex_lidar_slam.launch.py}"
      APEX_ENABLE_RECON_MAPPING: "${APEX_ENABLE_RECON_MAPPING:-0}"
      APEX_RECON_DIAGNOSTIC_MODE: "${APEX_RECON_DIAGNOSTIC_MODE:-}"
      APEX_RECON_FIXED_SPEED_PCT: "${APEX_RECON_FIXED_SPEED_PCT:-}"
      APEX_RECON_STEP_DURATION_S: "${APEX_RECON_STEP_DURATION_S:-}"
      APEX_RECON_LOG_PATH: "${APEX_RECON_LOG_PATH:-}"
      APEX_RECON_LOG_FLUSH_EVERY: "${APEX_RECON_LOG_FLUSH_EVERY:-}"
      APEX_RECON_LOG_OVERWRITE: "${APEX_RECON_LOG_OVERWRITE:-}"
      APEX_RECON_TIMEOUT_S: "${APEX_RECON_TIMEOUT_S:-}"
      APEX_RECON_MAX_RECOVERIES: "${APEX_RECON_MAX_RECOVERIES:-}"
      APEX_RECON_MIN_PROGRESS_M: "${APEX_RECON_MIN_PROGRESS_M:-}"
      APEX_RECON_LOG_LEVEL: "${APEX_RECON_LOG_LEVEL:-}"
      APEX_STEERING_CENTER_TRIM_DC: "${APEX_STEERING_CENTER_TRIM_DC:-}"
      APEX_STEERING_DIRECTION_SIGN: "${APEX_STEERING_DIRECTION_SIGN:-}"
      APEX_RECORD_DEBUG: "${APEX_RECORD_DEBUG:-0}"
      APEX_DEBUG_RUN_ID: "${APEX_DEBUG_RUN_ID:-}"
      APEX_DEBUG_OUTPUT_DIR: "${APEX_DEBUG_OUTPUT_DIR:-/work/ros2_ws/debug_runs}"
    volumes:
      - ../ros2_ws:/work/ros2_ws
      - /sys/class/pwm:/sys/class/pwm
    working_dir: /work/ros2_ws
    command: ["/bin/bash", "/work/ros2_ws/scripts/start_apex_pipeline.sh"]
