    odom_frame_id: "odom_lidar_local"
    base_frame_id: "base_link"
    publish_rate_hz: 50.0
    publish_tf: false
    use_message_time: true
    accel_input_is_world_frame: true
    gyro_input_is_corrected: true
    planar_mount_yaw_deg: -90.0
    accel_bias_x: 0.0
    accel_bias_y: 0.0
    gyro_bias_z: 0.0
    max_dt_s: 0.05
    max_planar_accel_mps2: 4.5
    max_speed_mps: 2.5
    velocity_leak_tau_s: 4.0
    stationary_zero_gain: 8.0
    stationary_bias_alpha: 0.05
    launch_suppression_s: 0.25
    launch_min_accel_scale: 0.25
    launch_speed_cap_mps: 0.65
    lidar_pose_timeout_s: 0.35
    status_timeout_s: 0.75
    status_motion_release_accel_mps2: 0.10
    status_motion_release_speed_mps: 0.05
    status_motion_release_yaw_rate_rps: 0.03
    lidar_position_gain: 0.35
    lidar_yaw_gain: 0.75
    lidar_velocity_gain: 0.80
    lidar_min_translation_delta_m: 0.01
    lidar_min_translation_speed_mps: 0.06
    lidar_reacquire_ramp_s: 0.40
    lidar_reacquire_position_gain_start: 0.12
    lidar_reacquire_velocity_gain_start: 0.20
    innovation_bias_gain: 0.10
    gyro_bias_gain: 0.08
    lidar_relative_valid_quality_min: 0.08
    lidar_relative_nominal_covariance_x_m2: 0.01
    lidar_relative_nominal_covariance_y_m2: 0.01
    lidar_relative_nominal_yaw_covariance_rad2: 0.04
    base_pose_covariance_x_m2: 0.02
    base_pose_covariance_y_m2: 0.02
    base_yaw_covariance_rad2: 0.03
    base_twist_covariance_xy_m2ps2: 0.20
    stale_covariance_scale: 25.0

lidar_pose_bridge:
  ros__parameters:
    scan_topic: "/lidar/scan_localization"
    pose_topic: "/apex/lidar/pose_local"
    pose_frame_id: "odom_lidar_local"
    base_frame_id: "base_link"
    publish_rate_hz: 20.0
    scan_timeout_s: 0.25
    tf_timeout_s: 0.05
    covariance_x_m2: 0.01
    covariance_y_m2: 0.01
    covariance_yaw_rad2: 0.04
    stale_covariance_scale: 50.0

apex_rplidar_publisher:
  ros__parameters:
    port: "/dev/ttyUSB0"
    baudrate: 115200
    topic: "/lidar/scan"
    localization_topic: "/lidar/scan_localization"
    max_buf_meas: 2000
    localization_samples: 360
    localization_missing_as_inf: true
    frame_id: "laser"
    heading_offset_deg: 91
    fov_filter_deg: 360
    point_timeout_ms: 120
    fill_missing_bins: false
    range_min: 0.05
    range_max: 12.0

apex_recon_mapping_node:
  ros__parameters:
    scan_topic: "/lidar/scan"
    scan_timeout_s: 0.6
    control_rate_hz: 10.0
    map_frame: "map"
    base_frame: "base_link"
    heading_offset_deg: 91
    pose_source_mode: "odometry_topic"
    odometry_input_topic: "/odometry/filtered"
    lidar_pose_topic: "/apex/lidar/pose_local"
    lidar_pose_timeout_s: 0.25

    steering_channel: 1
    steering_frequency_hz: 50.0
    steering_limit_deg: 18.0
    steering_dc_min: 5.0
    steering_dc_max: 8.6
    steering_center_trim_dc: 1.4
    steering_direction_sign: -1.0

    motor_channel: 0
    motor_frequency_hz: 50.0
    motor_dc_min: 5.0
    motor_dc_max: 10.0
    motor_neutral_dc: 7.5
    reverse_brake_dc: 6.9
    reverse_brake_hold_s: 0.12
    reverse_neutral_hold_s: 0.12
    reverse_exit_hold_s: 0.15

    explore_min_speed_pct: 20.0
    explore_max_speed_pct: 24.0
    recovery_reverse_speed_pct: 30.0
    recovery_duration_s: 0.8
    recovery_trigger_distance_m: 0.30
    recovery_trigger_cycles: 4

    stop_distance_m: 0.35
    slow_distance_m: 0.90
    front_window_deg: 12
    side_window_deg: 70
    fov_half_angle_deg: 90.0
    steering_gain: 0.35
    center_angle_penalty_per_deg: 0.012
    wall_centering_gain_deg_per_m: 18.0
    wall_centering_limit_deg: 18.0
    wall_centering_base_weight: 0.35
    wall_avoid_distance_m: 0.45
    wall_avoid_gain_deg_per_m: 25.0
    wall_avoid_limit_deg: 20.0
    gap_escape_heading_threshold_deg: 45.0
    gap_escape_release_distance_m: 0.18
    gap_escape_weight: 0.35
    corridor_balance_ratio_threshold: 0.20
    corridor_front_min_clearance_m: 0.08
    corridor_side_min_clearance_m: 0.05
    corridor_front_turn_weight: 0.70
    corridor_override_margin_deg: 4.0
    corridor_min_heading_deg: 2.0
    corridor_wall_start_deg: 25
    corridor_wall_end_deg: 85
    corridor_wall_min_points: 6
    wall_follow_target_distance_m: 0.24
    wall_follow_gain_deg_per_m: 55.0
    wall_follow_limit_deg: 22.0
    wall_follow_activation_heading_deg: 10.0
    wall_follow_release_balance_ratio: 0.72
    wall_follow_min_cycles: 10
    wall_follow_max_clearance_m: 1.25
    wall_follow_front_turn_weight: 0.35
    startup_consensus_min_heading_deg: 2.0
    startup_valid_cycles_required: 3
    startup_gap_lockout_cycles: 8
    startup_latch_cycles: 18
    ambiguity_probe_speed_pct: 20.0
    turn_speed_reduction: 0.35
    min_turn_speed_factor: 0.70
    smoothing_window: 9
    vehicle_half_width_m: 0.11
    vehicle_front_overhang_m: 0.11
    vehicle_rear_overhang_m: 0.31
    state_velocity_topic: "/apex/kinematics/velocity"
    state_acceleration_topic: "/apex/kinematics/acceleration"
    state_angular_velocity_topic: "/apex/kinematics/angular_velocity"
    state_status_topic: "/apex/kinematics/status"
    state_timeout_s: 0.5
    curve_probe_progress_stall_cycles_limit: 8
    curve_probe_progress_epsilon: 0.01
    curve_probe_wrong_side_lateral_threshold_m: 0.12
    trajectory_horizon_m: 0.95
    trajectory_lookahead_min_m: 0.35
    trajectory_lookahead_max_m: 1.00
    trajectory_curvature_slew_per_cycle: 0.22
    trajectory_track_memory_alpha: 0.55
    trajectory_exit_heading_threshold_deg: 2.0
    trajectory_curve_speed_gain: 1.2
    trajectory_state_aux_weight: 0.20
    trajectory_min_confidence: 0.28
    trajectory_flip_hold_cycles: 8
    trajectory_entry_heading_threshold_deg: 4.0
    trajectory_min_radius_m: 1.35
    trajectory_curve_heading_limit_deg: 18.0
    fullsoft_field_of_view_deg: 180
    fullsoft_convolution_size: 71
    fullsoft_avoid_corner_max_angle: 8
    fullsoft_avoid_corner_min_distance_m: 2.5
    fullsoft_avoid_corner_scale_factor: 1.2
    fullsoft_speed_curve_decay_factor: 0.03
    fullsoft_speed_stop_distance_m: 0.30
    fullsoft_speed_slow_distance_m: 0.80
    fullsoft_bias_heading_limit_deg: 4.0
    fullsoft_curve_evidence_low: 0.28
    fullsoft_curve_evidence_high: 0.48
    fullsoft_same_sign_slew_deg: 6.0
    fullsoft_opposite_sign_slew_deg: 1.5
    fullsoft_straight_balance_ratio_threshold: 0.18
    fullsoft_straight_front_balance_ratio_threshold: 0.20
    fullsoft_straight_heading_limit_deg: 8.0
    fullsoft_straight_activation_heading_deg: 18.0
    fullsoft_straight_min_front_clearance_m: 0.45
    fullsoft_straight_support_heading_threshold_deg: 4.0
    fullsoft_curve_preview_heading_limit_deg: 10.0
    fullsoft_curve_preview_support_heading_deg: 1.6
    fullsoft_curve_preview_min_cycles: 4
    fullsoft_curve_preview_balance_ratio_threshold: 0.30
    fullsoft_curve_entry_heading_limit_deg: 14.0
    fullsoft_curve_balance_ratio_threshold: 0.65
    fullsoft_curve_support_heading_deg: 18.0
    fullsoft_curve_progress_exponent: 2.4

    enable_autostop_on_lap: true
    lap_min_duration_s: 25.0
    lap_min_path_length_m: 8.0
    lap_depart_radius_m: 1.2
    lap_return_radius_m: 0.6
    save_map_on_completion: true
    map_output_prefix: "/work/ros2_ws/maps/apex_recon_map"
    reset_map_on_start: true
    reset_service_name: "/slam_toolbox/reset"
    clear_previous_saved_map_files: true

    diagnostic_mode: "calibration"
    diagnostic_fixed_speed_pct: 20.0
    diagnostic_step_duration_s: 1.2
    diagnostic_log_every_n_cycles: 1
    diagnostic_log_path: "/work/ros2_ws/logs/recon_diagnostic.log"
    diagnostic_file_flush_every_n_records: 5
    diagnostic_overwrite_log_on_start: true
    diagnostic_recon_timeout_s: 25.0
    diagnostic_max_recoveries: 4
    diagnostic_min_progress_m: 0.30
