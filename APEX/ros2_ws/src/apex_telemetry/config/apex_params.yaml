nano_accel_serial_node:
  ros__parameters:
    serial_port: "/dev/ttyACM0"
    baudrate: 115200
    serial_timeout_s: 0.5
    reconnect_delay_s: 1.0
    connect_toggle_dtr: true
    connect_dtr_low_s: 0.2
    connect_settle_s: 2.0
    flush_input_on_connect: true
    log_no_data_every_s: 5.0
    frame_id: "imu_link"
    topic: "/apex/imu/acceleration/raw"
    gyro_topic: "/apex/imu/angular_velocity/raw"
    imu_topic: "/apex/imu/data_raw"
    publish_imu_topic: true
    allow_legacy_3axis_lines: false
    log_every_n_invalid: 25
    log_every_n_no_gyro: 100

kinematics_estimator_node:
  ros__parameters:
    input_topic: "/apex/imu/acceleration/raw"
    gyro_input_topic: "/apex/imu/angular_velocity/raw"
    acceleration_topic: "/apex/kinematics/acceleration"
    velocity_topic: "/apex/kinematics/velocity"
    position_topic: "/apex/kinematics/position"
    angular_velocity_topic: "/apex/kinematics/angular_velocity"
    heading_topic: "/apex/kinematics/heading"
    corrected_imu_topic: "/apex/imu/data_corrected"
    frame_id: "base_link"
    use_message_time: true
    max_dt_s: 0.05
    accel_low_pass_alpha: 0.35
    gyro_low_pass_alpha: 0.45
    deadband_mps2: 0.05
    gyro_deadband_rps: 0.01
    integrate_accel_in_world_frame: true
    use_gyro_yaw: true
    gravity_compensation_enabled: true
    gravity_axis: "z"
    planar_mount_yaw_deg: -90.0
    accel_bias_x: 0.302
    accel_bias_y: 0.490
    accel_bias_z: -0.063
    gyro_bias_x: 0.0
    gyro_bias_y: -0.093
    gyro_bias_z: -0.050
    status_topic: "/apex/kinematics/status"
    startup_static_calibration_enabled: true
    startup_static_calibration_duration_s: 2.5
    calibration_accel_stddev_threshold_mps2: 0.08
    calibration_gyro_stddev_threshold_rps: 0.015
    calibration_gravity_norm_tolerance_mps2: 0.35
    calibration_best_effort_enabled: true
    calibration_max_total_duration_s: 6.0
    calibration_fallback_accel_stddev_threshold_mps2: 0.22
    calibration_fallback_gyro_stddev_threshold_rps: 0.035
    calibration_fallback_gravity_norm_tolerance_mps2: 0.80
    stationary_accel_threshold_mps2: 0.10
    stationary_gyro_threshold_rps: 0.02
    stationary_speed_threshold_mps: 0.05
    stationary_hold_s: 0.35
    stationary_release_accel_multiplier: 1.05
    stationary_release_speed_multiplier: 1.50
    stationary_release_gyro_multiplier: 1.25
    zero_velocity_update_enabled: true
    velocity_decay_enabled: true
    velocity_decay_tau_s: 0.8

kinematics_odometry_node:
  ros__parameters:
    position_topic: "/apex/kinematics/position"
    velocity_topic: "/apex/kinematics/velocity"
    heading_topic: "/apex/kinematics/heading"
    angular_velocity_topic: "/apex/kinematics/angular_velocity"
    odom_topic: "/apex/odometry/imu_raw"
    odom_frame_id: "odom_imu_raw"
    base_frame_id: "base_link"
    translation_mode: "full"
    publish_rate_hz: 50.0
    publish_tf: true
    use_heading_topic: true
    heading_timeout_s: 0.5
    integrate_yaw_from_rate_when_heading_missing: true
    use_velocity_heading: true
    min_speed_for_heading_mps: 0.05

apex_rplidar_publisher:
  ros__parameters:
    port: "/dev/ttyUSB0"
    baudrate: 115200
    topic: "/lidar/scan"
    localization_topic: "/lidar/scan_localization"
    max_buf_meas: 2000
    localization_samples: 360
    localization_missing_as_inf: true
    frame_id: "laser"
    heading_offset_deg: 91
    fov_filter_deg: 360
    point_timeout_ms: 120
    fill_missing_bins: false
    range_min: 0.05
    range_max: 12.0

imu_lidar_planar_fusion_node:
  ros__parameters:
    imu_topic: "/apex/imu/data_raw"
    scan_topic: "/lidar/scan_localization"
    odom_topic: "/apex/odometry/imu_lidar_fused"
    path_topic: "/apex/estimation/path"
    status_topic: "/apex/estimation/status"
    odom_frame_id: "odom_imu_lidar_fused"
    child_frame_id: "base_link"
    publish_tf: false
    status_publish_rate_hz: 2.0
    path_max_poses: 4000
    median_window: 5
    ema_alpha: 0.25
    static_window_s: 0.4
    static_search_s: 2.0
    velocity_decay_tau_s: 1.1
    submap_window_scans: 6
    point_stride: 2
    max_correspondence_m: 0.35
    initial_scan_count_min: 4
    max_initial_alignment_scans: 6
    corridor_bin_m: 0.10
    low_confidence_residual_m: 0.16
    min_valid_correspondence_count: 14
    max_scan_optimization_evals: 80

curve_entry_path_planner_node:
  ros__parameters:
    scan_topic: "/lidar/scan_localization"
    odom_topic: "/apex/odometry/imu_lidar_fused"
    fusion_status_topic: "/apex/estimation/status"
    path_topic: "/apex/planning/curve_entry_path"
    target_topic: "/apex/planning/curve_entry_target"
    status_topic: "/apex/planning/curve_entry_status"
    odom_frame_id: "odom_imu_lidar_fused"
    snapshot_scan_count: 8
    stationary_speed_threshold_mps: 0.05
    stationary_yaw_rate_threshold_rps: 0.05
    stationary_hold_s: 0.6
    lidar_offset_x_m: 0.18
    lidar_offset_y_m: 0.0
    tracking_origin_offset_x_m: -0.15
    tracking_origin_offset_y_m: 0.0
    origin_bridge_point_count: 12
    planning_wheelbase_m: 0.30
    planning_max_steering_deg: 18.0
    path_curvature_limit_scale: 0.75
    path_resample_step_m: 0.04
    path_smoothing_alpha: 0.22
    path_smoothing_max_iterations: 120
    status_publish_rate_hz: 2.0

curve_path_tracker_node:
  ros__parameters:
    path_topic: "/apex/planning/curve_entry_path"
    planning_status_topic: "/apex/planning/curve_entry_status"
    odom_topic: "/apex/odometry/imu_lidar_fused"
    fusion_status_topic: "/apex/estimation/status"
    arm_topic: "/apex/tracking/arm"
    cmd_vel_topic: "/apex/cmd_vel_track"
    status_topic: "/apex/tracking/status"
    control_rate_hz: 20.0
    wheelbase_m: 0.30
    rear_axle_offset_x_m: -0.15
    rear_axle_offset_y_m: 0.0
    min_lookahead_m: 0.25
    max_lookahead_m: 0.55
    lookahead_speed_gain: 0.9
    min_linear_speed_mps: 0.10
    max_linear_speed_mps: 0.24
    curvature_speed_gain: 1.8
    max_lateral_accel_mps2: 0.08
    slowdown_distance_m: 0.55
    goal_tolerance_m: 0.18
    goal_yaw_tolerance_rad: 0.35
    goal_line_stop_margin_m: 0.00
    goal_line_activation_tail_points: 8
    max_path_deviation_m: 0.45
    startup_ramp_duration_s: 1.5
    startup_speed_scale_min: 0.65
    low_confidence_abort_hold_s: 0.75
    global_timeout_s: 12.0
