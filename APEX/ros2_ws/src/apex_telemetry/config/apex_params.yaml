nano_accel_serial_node:
  ros__parameters:
    serial_port: "/dev/ttyACM0"
    baudrate: 115200
    serial_timeout_s: 0.5
    reconnect_delay_s: 1.0
    connect_toggle_dtr: true
    connect_dtr_low_s: 0.2
    connect_settle_s: 2.0
    flush_input_on_connect: true
    log_no_data_every_s: 5.0
    frame_id: "imu_link"
    topic: "/apex/imu/acceleration/raw"
    gyro_topic: "/apex/imu/angular_velocity/raw"
    imu_topic: "/apex/imu/data_raw"
    publish_imu_topic: true
    allow_legacy_3axis_lines: false
    log_every_n_invalid: 25
    log_every_n_no_gyro: 100

kinematics_estimator_node:
  ros__parameters:
    input_topic: "/apex/imu/acceleration/raw"
    gyro_input_topic: "/apex/imu/angular_velocity/raw"
    acceleration_topic: "/apex/kinematics/acceleration"
    velocity_topic: "/apex/kinematics/velocity"
    position_topic: "/apex/kinematics/position"
    angular_velocity_topic: "/apex/kinematics/angular_velocity"
    heading_topic: "/apex/kinematics/heading"
    frame_id: "base_link"
    use_message_time: true
    max_dt_s: 0.05
    accel_low_pass_alpha: 0.35
    gyro_low_pass_alpha: 0.45
    deadband_mps2: 0.05
    gyro_deadband_rps: 0.01
    integrate_accel_in_world_frame: true
    use_gyro_yaw: true
    gravity_compensation_enabled: true
    gravity_axis: "z"
    planar_mount_yaw_deg: -90.0
    accel_bias_x: 0.302
    accel_bias_y: 0.490
    accel_bias_z: -0.063
    gyro_bias_x: 0.0
    gyro_bias_y: -0.093
    gyro_bias_z: -0.050
    status_topic: "/apex/kinematics/status"
    startup_static_calibration_enabled: true
    startup_static_calibration_duration_s: 2.5
    stationary_accel_threshold_mps2: 0.10
    stationary_gyro_threshold_rps: 0.02
    stationary_speed_threshold_mps: 0.05
    stationary_hold_s: 0.35
    stationary_release_accel_multiplier: 1.05
    stationary_release_speed_multiplier: 1.50
    stationary_release_gyro_multiplier: 1.25
    zero_velocity_update_enabled: true
    velocity_decay_enabled: true
    velocity_decay_tau_s: 0.8

kinematics_odometry_node:
  ros__parameters:
    position_topic: "/apex/kinematics/position"
    velocity_topic: "/apex/kinematics/velocity"
    heading_topic: "/apex/kinematics/heading"
    angular_velocity_topic: "/apex/kinematics/angular_velocity"
    odom_topic: "/apex/odometry/imu_raw"
    odom_frame_id: "odom_imu_raw"
    base_frame_id: "base_link"
    translation_mode: "full"
    publish_rate_hz: 50.0
    publish_tf: true
    use_heading_topic: true
    heading_timeout_s: 0.5
    integrate_yaw_from_rate_when_heading_missing: true
    use_velocity_heading: true
    min_speed_for_heading_mps: 0.05

lidar_relative_odometry_node:
  ros__parameters:
    scan_topic: "/lidar/scan_localization"
    odom_topic: "/apex/lidar/relative_odom"
    pose_topic: "/apex/lidar/pose_local"
    status_topic: "/apex/kinematics/status"
    odom_frame_id: "odom_lidar_local"
    child_frame_id: "laser"
    min_usable_range_m: 0.08
    max_usable_range_m: 8.0
    max_points: 160
    max_iterations: 12
    max_correspondence_distance_m: 0.12
    max_step_translation_m: 0.08
    max_step_yaw_rad: 0.06
    min_valid_points: 40
    min_match_count: 24
    min_match_ratio: 0.24
    max_rmse_m: 0.045
    quality_error_scale_m: 0.024
    min_quality: 0.20
    min_translation_observable_m: 0.012
    min_rotation_observable_rad: 0.01
    min_consecutive_observable_updates: 2
    status_timeout_s: 0.75
    status_motion_release_accel_mps2: 0.08
    status_motion_release_speed_mps: 0.04
    status_motion_release_yaw_rate_rps: 0.03
    nominal_covariance_x_m2: 0.01
    nominal_covariance_y_m2: 0.01
    nominal_covariance_yaw_rad2: 0.04
    invalid_covariance_scale: 50.0
    stale_twist_covariance_scale: 25.0

imu_lidar_planar_fusion_node:
  ros__parameters:
    accel_topic: "/apex/kinematics/acceleration"
    gyro_topic: "/apex/kinematics/angular_velocity"
    lidar_relative_odom_topic: "/apex/lidar/relative_odom"
