/**:
  ros__parameters:
    use_sim_time: false
    mode: mapping
    map_frame: odom_lidar_local
    odom_frame: odom_imu_yaw
    base_frame: base_link
    scan_topic: /lidar/scan

    throttle_scans: 1
    transform_publish_period: 0.02
    map_update_interval: 0.1
    resolution: 0.05
    max_laser_range: 12.0
    minimum_time_interval: 0.05
    transform_timeout: 0.2
    tf_buffer_duration: 20.0
    stack_size_to_use: 40000000
    enable_interactive_mode: false

    use_scan_matching: true
    use_scan_barycenter: false
    minimum_travel_distance: 0.005
    minimum_travel_heading: 0.004
    scan_buffer_size: 20
    scan_buffer_maximum_scan_distance: 8.0
    link_match_minimum_response_fine: 0.1
    link_scan_maximum_distance: 1.0
    loop_search_maximum_distance: 0.0
    do_loop_closing: false
